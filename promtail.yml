server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log

    pipeline_stages:
      - docker: {}
      
      - json:
          expressions:
            level: level
            msg: msg
            ts: ts
            service: service
            env: env
            request_id: request_id

      - labels:
          level:
          service:
          env:
          request_id: